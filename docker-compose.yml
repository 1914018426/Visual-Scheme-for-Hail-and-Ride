services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      cache_from:
        - type=local,src=.buildx-cache/backend
      cache_to:
        - type=local,dest=.buildx-cache/backend,mode=max
      args:
        YOLO_MODEL: yolov8x-pose.pt
    container_name: hailuo-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      # Hugging Face 国内镜像
      - HF_ENDPOINT=https://hf-mirror.com
      # Ultralytics 用户配置目录（可写，避免落到 /tmp）
      - YOLO_CONFIG_DIR=/app/.ultralytics
      # --- AI 推理参数 ---
      - YOLO_MODEL=yolov8x-pose.pt
      - AI_INFERENCE_IMGSZ=896
      - AI_INFERENCE_HALF=false
      - AI_CONF_THRESHOLD=0.35
      - AI_MAX_DETECTIONS=20
      # --- 视频流参数 ---
      - STREAM_FPS=15
      - STREAM_WIDTH=1280
      - STREAM_HEIGHT=720
      - STREAM_BUFFER_SIZE=5
      - STREAM_LOW_LATENCY=true
      - ADAPTIVE_MIN_SHORT_SIDE=512
      - ADAPTIVE_MAX_SHORT_SIDE=960
      - WS_FRAME_BUDGET_MS=2500
      - WS_PUSH_INTERVAL=0.1
      - JPEG_QUALITY=88
      # --- 手势识别开关与阈值 ---
      - ENABLE_HAND_DETECTION=true
      - GESTURE_CONFIDENCE=0.7
      # --- 手势识别时间窗口与精度参数 ---
      - GESTURE_MIN_DURATION_S=2.5
      - GESTURE_PALM_FACING_RATIO=0.60
      - GESTURE_ARM_POSE_RATIO=0.50
      - GESTURE_MOTION_PURITY=0.65
      - GESTURE_MIN_CYCLES=2
      - GESTURE_CYCLE_MAX_PERIOD_S=1.5
      - GESTURE_STRAIGHT_ARM_ANGLE=120
      # --- 帧级状态机参数（方案B）---
      - GESTURE_VELOCITY_THRESHOLD=150.0
      - GESTURE_CONFIRM_FRAMES=4
      - GESTURE_STOP_RESET_FRAMES=6
      - GESTURE_IDLE_RESET_FRAMES=3
      - GESTURE_MIN_AMPLITUDE=0.25
      - GESTURE_HAILING_MIN_HEIGHT_RATIO=0.3
    # 数据持久化：模型与配置挂载到宿主机，避免重建时重复下载
    volumes:
      - ./models:/app/models:rw
      - ./.ultralytics:/app/.ultralytics:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - hailuo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      cache_from:
        - type=local,src=.buildx-cache/frontend
      cache_to:
        - type=local,dest=.buildx-cache/frontend,mode=max
    container_name: hailuo-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - hailuo-network

  nginx:
    image: nginx:alpine
    container_name: hailuo-nginx
    restart: unless-stopped
    ports:
      - "18080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hailuo-network

networks:
  hailuo-network:
    driver: bridge
