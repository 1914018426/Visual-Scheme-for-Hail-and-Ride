services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hailuo-backend:latest
    container_name: hailuo-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Hugging Face 国内镜像
      - HF_ENDPOINT=https://hf-mirror.com
      # Ultralytics 用户配置目录（可写，避免落到 /tmp）
      - YOLO_CONFIG_DIR=/app/.ultralytics
      # --- AI 推理参数 ---
      # 切换到 yolo11s-pose：相比 x 档体积小 ~22x、推理快 4-6x，精度下降可控
      - YOLO_MODEL=yolo11s-pose.pt
      - AI_INFERENCE_IMGSZ=640
      - AI_INFERENCE_HALF=true
      - AI_CONF_THRESHOLD=0.35
      - AI_MAX_DETECTIONS=20
      # --- 视频流参数 ---
      - STREAM_FPS=15
      - STREAM_WIDTH=1280
      - STREAM_HEIGHT=720
      - STREAM_BUFFER_SIZE=5
      - STREAM_LOW_LATENCY=true
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=rtsp_transport;tcp|buffer_size;1024|max_delay;100000
      # 摄像头地址：每次容器重启都会读取这些值，避免运行时通过 API 添加后丢失
      - CAMERA_FRONT=rtmp://sztu-video.lingubot.cn/live/camera/KRIPC_93002871_100
      - CAMERA_BACK=rtmp://sztu-video.lingubot.cn/live/camera/KRIPC_93003115_60
      - CAMERA_LEFT=rtmp://sztu-video.lingubot.cn/live/camera/KRIPC_93002892_28
      - CAMERA_RIGHT=rtmp://sztu-video.lingubot.cn/live/camera/KRIPC_93003115_86
      - ADAPTIVE_MIN_SHORT_SIDE=320
      # 480 短边对应 480×854 ≈ 80KB JPEG，4 路下浏览器可稳定 60Hz 重绘；
      # 720 时单帧 280KB，4 路 20MB/s 会让 React 渲染主线程出现 1s+ 卡顿
      - ADAPTIVE_MAX_SHORT_SIDE=480
      # 预算 60ms：让自适应在卡顿时更快缩 short_side / quality
      - WS_FRAME_BUDGET_MS=60
      - WS_PUSH_INTERVAL=0.04
      # 65 在视觉差异上接近 75，但 JPEG 数据 ~30% 更小
      - JPEG_QUALITY=65
      # --- 手势识别开关 ---
      # MediaPipe Hands 开销极大(CPU/GIL瓶颈)，当前 simple-transformer 引擎已用
      # 前臂方向代理 palm_normal，关闭后可提升 4-8 倍推流帧率
      - ENABLE_HAND_DETECTION=false
      - ENABLE_TRACKING=true
      # --- 三锁合取机制：姿态锁 + 朝向锁 + 运动锁 ---
      # 姿态锁阈值（θ1-θ2 角度链）
      - GESTURE_THETA1_HAILING_MIN=25.0
      - GESTURE_THETA2_STRAIGHT_MIN=15.0
      - GESTURE_ARM_EXTENSION_MIN=0.10
      # 锁持续帧数
      - GESTURE_POSE_MIN_FRAMES=3
      - GESTURE_ORIENTATION_MIN_FRAMES=5
      - GESTURE_MOTION_MIN_FRAMES=3
      # 确认后保持帧数（约 1 秒 @ 15fps）
      - GESTURE_HOLD_MAX_FRAMES=15
      # 朝向锁：法向量与视线方向夹角（度），放宽以补偿 MediaPipe Z 轴不可靠
      - GESTURE_ORIENTATION_LOCK_ANGLE=55.0
      - GESTURE_ORIENTATION_RELEASE_ANGLE=60.0
      # 运动锁：FFT 频率范围（Hz）与振幅（torso_units），0.35 Hz 覆盖年长者
      - GESTURE_MOTION_FREQ_MIN=0.35
      - GESTURE_MOTION_FREQ_MAX=3.0
      - GESTURE_MOTION_AMP_MIN=0.1
      - GESTURE_MOTION_SPEED_MIN=0.05
      # 面部过滤（零模型）
      - GESTURE_FACING_HARD_THRESHOLD=0.25
      - GESTURE_FACING_SOFT_THRESHOLD=0.6
      # 周期性检测
      - GESTURE_PERIOD_MIN_CYCLES=2
      - GESTURE_PERIOD_CONSISTENCY_MIN=0.5
      - GESTURE_PERIOD_MIN_FREQ=0.35
      - GESTURE_PERIOD_MAX_FREQ=3.0
      # 置信度平滑
      - GESTURE_EMA_ALPHA=0.35
      - GESTURE_CONFIDENCE_THRESHOLD=0.55
      # --- Transformer 手势引擎 ---
      # 引擎模式: "triplelock" | "simple" | "transformer" | "simple-transformer" | "hybrid"
      # simple-transformer：Simple 为主，Transformer 为辅
      - GESTURE_ENGINE=simple-transformer
      - TRANSFORMER_MODEL_PATH=/app/models/transformer/waving_transformer_real.pt
      - TRANSFORMER_CONFIDENCE_THRESHOLD=0.5
    # 数据持久化：模型与配置挂载到宿主机，避免重建时重复下载
    volumes:
      - ./models:/app/models:rw
      - ./.ultralytics:/app/.ultralytics:rw
      - ./datasets:/app/datasets:ro
      - ./data:/app/data:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - hailuo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      cache_from:
        - type=local,src=.buildx-cache/frontend
      cache_to:
        - type=local,dest=.buildx-cache/frontend,mode=max
    container_name: hailuo-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - hailuo-network

  nginx:
    image: nginx:alpine
    container_name: hailuo-nginx
    restart: unless-stopped
    ports:
      - "18080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hailuo-network

networks:
  hailuo-network:
    driver: bridge
