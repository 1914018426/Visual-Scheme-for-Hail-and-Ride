services:
  backend:
    image: hailuo-backend:latest
    container_name: hailuo-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      # Hugging Face 国内镜像
      - HF_ENDPOINT=https://hf-mirror.com
      # Ultralytics 用户配置目录（可写，避免落到 /tmp）
      - YOLO_CONFIG_DIR=/app/.ultralytics
      # --- AI 推理参数 ---
      - YOLO_MODEL=yolo11x-pose.pt
      - AI_INFERENCE_IMGSZ=896
      - AI_INFERENCE_HALF=true
      - AI_CONF_THRESHOLD=0.35
      - AI_MAX_DETECTIONS=20
      # --- 视频流参数 ---
      - STREAM_FPS=15
      - STREAM_WIDTH=1280
      - STREAM_HEIGHT=720
      - STREAM_BUFFER_SIZE=5
      - STREAM_LOW_LATENCY=true
      - ADAPTIVE_MIN_SHORT_SIDE=512
      - ADAPTIVE_MAX_SHORT_SIDE=960
      - WS_FRAME_BUDGET_MS=2500
      - WS_PUSH_INTERVAL=0.1
      - JPEG_QUALITY=88
      # --- 手势识别开关 ---
      - ENABLE_HAND_DETECTION=true
      - ENABLE_TRACKING=true
      # --- 手臂姿势阈值 ---
      - GESTURE_THETA1_HAILING_MIN=25.0
      - GESTURE_THETA1_GREETING_MIN=15.0
      - GESTURE_THETA1_GREETING_MAX=150.0
      - GESTURE_THETA2_STRAIGHT_MIN=15.0
      - GESTURE_ARM_EXTENSION_MIN=0.10
      # --- 速度与状态机 ---
      - GESTURE_VELOCITY_THRESHOLD=0.3
      - GESTURE_VELOCITY_IDLE_RATIO=0.25
      - GESTURE_CONFIRM_FRAMES=3
      - GESTURE_STOP_RESET_FRAMES=15
      - GESTURE_IDLE_RESET_FRAMES=8
      # --- 周期性检测 ---
      - GESTURE_PERIOD_MIN_CYCLES=1
      - GESTURE_PERIOD_MIN_AMPLITUDE_TU=0.15
      - GESTURE_PERIOD_CONSISTENCY_MIN=0.25
      - GESTURE_PERIOD_MIN_FREQ=0.8
      - GESTURE_PERIOD_MAX_FREQ=3.5
      # --- 方向追踪 ---
      - GESTURE_SIGN_CHANGE_MIN=1
      - GESTURE_DIRECTION_CONSISTENCY_MIN=0.65
      # --- 手掌朝向 ---
      - GESTURE_PALM_FAN_ANGLE_MIN=30.0
      - GESTURE_PALM_FINGER_RATIO_MIN=0.90
      # --- 身体与运动过滤 ---
      - GESTURE_BODY_FACING_MIN=0.0
      - GESTURE_MOTION_PURITY_MIN=0.10
      # --- 置信度与模式 ---
      - GESTURE_EMA_ALPHA=0.35
      - GESTURE_CONFIDENCE_THRESHOLD=0.55
      - GESTURE_FAST_MODE=true
    # 数据持久化：模型与配置挂载到宿主机，避免重建时重复下载
    volumes:
      - ./models:/app/models:rw
      - ./.ultralytics:/app/.ultralytics:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - hailuo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      cache_from:
        - type=local,src=.buildx-cache/frontend
      cache_to:
        - type=local,dest=.buildx-cache/frontend,mode=max
    container_name: hailuo-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - hailuo-network

  nginx:
    image: nginx:alpine
    container_name: hailuo-nginx
    restart: unless-stopped
    ports:
      - "18080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hailuo-network

networks:
  hailuo-network:
    driver: bridge
